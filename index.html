<!DOCTYPE html>
<html>
<head>
<style>
  .stage { perspective: 800px; width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; background: #0a0a1a; }
  .ring { width: 300px; height: 200px; transform-style: preserve-3d; animation: spin 20s linear infinite; position: relative; }
  .ring img { position: absolute; width: 200px; height: 150px; border-radius: 12px; object-fit: cover; box-shadow: 0 0 30px rgba(100,100,255,0.3); }
  @keyframes spin { 100% { transform: rotateY(360deg); } }
</style>
</head>
<body>
<div class="stage">
  <div class="ring" id="ring"></div>
</div>
<script>
  const ring = document.getElementById('ring');
  const count = 12;
  const radius = 400;
  for (let i = 0; i < count; i++) {
    const img = document.createElement('img');
    img.src = `https://picsum.photos/seed/${i}/400/300`;
    const angle = (i / count) * 360;
    img.style.transform = `rotateY(${angle}deg) translateZ(${radius}px)`;
    ring.appendChild(img);
  }
</script>
</body>
</html>
