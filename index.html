<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  /* ===== 舞台 ===== */
  .stage {
    width: 100vw; height: 100vh;
    background: #0b0b1a;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
    position: relative;
    perspective: 1100px;
  }

  /* ===== 上下渐变遮罩 — 卡片淡入淡出 ===== */
  .fade-top, .fade-bot {
    position: absolute; left: 0; right: 0;
    height: 28vh;
    pointer-events: none;
    z-index: 10;
  }
  .fade-top {
    top: 0;
    background: linear-gradient(to bottom, #0b0b1a 0%, rgba(11,11,26,0.85) 40%, transparent 100%);
  }
  .fade-bot {
    bottom: 0;
    background: linear-gradient(to top, #0b0b1a 0%, rgba(11,11,26,0.85) 40%, transparent 100%);
  }

  /* ===== 第1层：背景镂空大字 ===== */
  .bg-wrapper {
    position: absolute; inset: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    pointer-events: none;
    user-select: none;
    will-change: transform;
  }
  .bg-text {
    font-family: 'Georgia', 'Times New Roman', serif;
    font-size: 15vw;
    font-weight: 900;
    color: transparent;
    -webkit-text-stroke: 1px rgba(255,255,255,0.045);
    letter-spacing: 0.06em;
    white-space: nowrap;
  }

  /* ===== 第2层：环境光晕 ===== */
  .light-orb {
    position: absolute;
    width: 600px; height: 600px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(110,140,255,0.08) 0%, transparent 70%);
    pointer-events: none;
    top: 50%; left: 50%;
    margin: -300px 0 0 -300px;
    will-change: transform;
  }

  /* ===== 第3层：3D 螺旋卡片组 ===== */
  .carousel {
    width: 0; height: 0;
    transform-style: preserve-3d;
    position: relative;
    will-change: transform;
  }

  /* ===== 卡片 ===== */
  .card {
    position: absolute;
    width: 190px;
    height: 130px;
    border-radius: 16px;
    background-size: cover;
    background-position: center;
    border: 1px solid rgba(255,255,255,0.06);
    left: -85px;
    top: -115px;
    will-change: transform, opacity, filter, box-shadow;
  }

  /* 光泽层 */
  .card::after {
    content: '';
    position: absolute; inset: 0;
    border-radius: 16px;
    background: linear-gradient(
      140deg,
      rgba(255,255,255,0.09) 0%,
      rgba(255,255,255,0.02) 35%,
      transparent 55%,
      rgba(0,0,0,0.05) 100%
    );
    pointer-events: none;
  }

  /* 标签 */
  .card-label {
    position: absolute;
    bottom: 14px; left: 14px; right: 14px;
    color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.10em;
    text-transform: uppercase;
    text-shadow: 0 1px 4px rgba(0,0,0,0.8), 0 0 8px rgba(0,0,0,0.4);
    opacity: 1;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 8px; right: 12px;
    width: 5px; height: 5px;
    border-radius: 50%;
    background: rgba(255,255,255,0.22);
    pointer-events: none;
  }
</style>
</head>
<body>

<div class="stage" id="stage">

  <!-- 渐变遮罩 -->
  <div class="fade-top"></div>
  <div class="fade-bot"></div>

  <!-- 第1层 -->
  <div class="bg-wrapper" id="bgWrapper">
    <div class="bg-text">SPIRAL</div>
  </div>

  <!-- 第2层 -->
  <div class="light-orb" id="lightOrb"></div>

  <!-- 第3层 -->
  <div class="carousel" id="carousel"></div>

</div>

<script>
  const stage    = document.getElementById('stage');
  const bgWrap   = document.getElementById('bgWrapper');
  const light    = document.getElementById('lightOrb');
  const carousel = document.getElementById('carousel');

  // ── 螺旋参数（全部卡片在一圈 360° 内）──
  const TOTAL       = 12;       // 卡片总数
  const HELIX_R     = 390;      // 螺旋半径（加大避免卡片重叠）
  const CARD_GAP    = 70;       // 卡片垂直间距 (px)
  const DEG_PER     = 360 / TOTAL;  // 相邻卡片转角 = 30°

  // ── 创建卡片 ──
  const cardData = [
    'Fashion','Fragrance','Watches','Audio',
    'Camera','Sneakers','Typography','Architecture',
    'Interior','Gadget','Ceramics','Lighting',
  ];

  const cardEls = [];
  for (let i = 0; i < TOTAL; i++) {
    const angle = i * DEG_PER;          // 0°,30°,60°…330°  全部在一圈内
    const baseY = i * CARD_GAP;                  // 沿螺旋向上排列

    const card = document.createElement('div');
    card.className = 'card';
    card.style.backgroundImage = `url(https://picsum.photos/seed/${300 + i}/380/500)`;

    const label = document.createElement('span');
    label.className = 'card-label';
    label.textContent = cardData[i] || `Card ${i}`;
    card.appendChild(label);

    carousel.appendChild(card);
    cardEls.push({ el: card, angle, baseY });
  }

  // ── 滚轮状态 ──
  let scroll      = 0;     // 累积滚轮量
  let current     = 0;     // lerp 后的当前值
  const VH        = window.innerHeight;

  // current=0 → 所有卡片在屏幕下方（无图可见）
  // current=max → 所有卡片已从上方消失

  stage.addEventListener('wheel', e => {
    e.preventDefault();
    scroll += e.deltaY * 0.70;
    scroll = Math.max(0, Math.min(TOTAL * CARD_GAP + VH * 1.3, scroll));
  }, { passive: false });

  // ── 主循环 ──
  function animate() {
    // lerp 缓动
    current += (scroll - current) * 0.07;

    /* ==============================================
     *  螺旋运动：滚轮驱动两个量
     *  ① carouselY  → 整个螺旋上升
     *  ② rotationY  → 螺旋自转（与上升同步）
     *
     *  current=0  → 螺旋在下方，无卡片可见
     *  current>0  → 螺旋上升 + 自转
     * ============================================== */
    const carouselY = VH * 0.65 - current;       // 从屏幕下方开始上升
    /* rotationY 与 carouselY 精确同步：
     *   卡片 i 到达视口中心时 carouselY = -i*CARD_GAP，
     *   此时 rotationY = -i*DEG_PER = -angle → 卡片正好面向观众
     *   12 张卡片刚好一圈 360°，每张都在屏幕正中达到 C 位 */
    const rotationY = (carouselY / CARD_GAP) * DEG_PER;

    carousel.style.transform =
      `rotateY(${rotationY}deg) translateY(${carouselY}px)`;

    // ★ 背景文字视差
    bgWrap.style.transform = `translateY(${-current * 0.12}px)`;

    // ★ 光晕偏移
    light.style.transform = `translate(0, ${-current * 0.25}px)`;

    // ★ 每张卡片的高亮
    for (const { el, angle, baseY } of cardEls) {
      // 卡片在屏幕空间中的 Y 位置（视口中心 = 0）
      const screenY  = baseY + carouselY;
      const dist     = Math.abs(screenY) / (VH * 0.55);   // 归一化距离
      const vertF    = Math.max(0, 1 - dist);              // 0→1，中心=1

      // 卡片面向角度（考虑螺旋自转）
      const facingDeg = angle + rotationY;
      const facing    = Math.cos(facingDeg * Math.PI / 180);
      const faceF     = (facing + 1) / 2;

      // 综合高亮：仅按垂直中心，正反面一致
      const h = vertF;

      const scale  = 0.65  + h * 0.45;
      const bright = 0.50  + h * 0.60;
      const depth  = 2     + h * 26;
      const spread = 8     + h * 45;

      let shadow = `0 ${depth}px ${spread}px rgba(0,0,0,${0.15 + h * 0.35})`;
      if (h > 0.6) {
        const g = (h - 0.6) / 0.4;
        shadow += `, 0 0 ${60 * g}px rgba(130,160,255,${g * 0.45})`;
      }

      el.style.transform =
        `rotateY(${angle}deg) translateZ(${HELIX_R}px) translateY(${baseY}px) scale(${scale})`;
      el.style.filter   = `brightness(${bright})`;
      el.style.boxShadow = shadow;
      el.style.opacity   = Math.max(0.25, Math.min(1, vertF * 1.1));
      el.style.zIndex    = Math.round(h * 150 + vertF * 50);
    }

    requestAnimationFrame(animate);
  }

  requestAnimationFrame(animate);
</script>

</body>
</html>
